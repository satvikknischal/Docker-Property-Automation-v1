# =============================================================================
#  Frigate Configuration — Residential Site
#  
#  Mode: Detection & Snapshots ONLY (no recording — separate NVR handles that)
#  Cameras: 16 Dahua/CP Plus cameras (from Camera Details sheet)
#  Detector: OpenVINO (Intel GPU/CPU)
#  Retention: 4 days auto-delete
#  
#  Required environment variables (set in .env):
#    FRIGATE_RTSP_USER       — RTSP camera username  (e.g. admin)
#    FRIGATE_RTSP_PASSWORD   — RTSP camera password  (URL-encoded, e.g. Dls@286%23)
#    FRIGATE_MQTT_USER       — MQTT broker username
#    FRIGATE_MQTT_PASSWORD   — MQTT broker password
# =============================================================================

# ── MQTT ─────────────────────────────────────────────────────────────────────
mqtt:
  host: 10.100.10.22
  port: 1883
  user: "{FRIGATE_MQTT_USER}"
  password: "{FRIGATE_MQTT_PASSWORD}"
  topic_prefix: frigate

# ── Hardware Acceleration  ───────────────────────────────────────────────────
# NOTE: VAAPI disabled — Intel iGPU cannot handle 16 concurrent HW decode
# sessions (causes "Failed to sync surface" crashes). CPU decoding of the
# low-res 704×576 sub-streams is lightweight and stable.
ffmpeg:
  hwaccel_args: []

# ── Go2rtc — Live streaming & WebRTC ─────────────────────────────────────────
go2rtc:
  streams:
    # ── Main Gate ──
    Main_Gate:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.11:554/cam/realmonitor?channel=1&subtype=0
    Main_Gate_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.11:554/cam/realmonitor?channel=1&subtype=1

    # ── Garden ──
    Garden:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.12:554/cam/realmonitor?channel=1&subtype=0
    Garden_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.12:554/cam/realmonitor?channel=1&subtype=1

    # ── Living Room ──
    Living_Room:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.13:554/cam/realmonitor?channel=1&subtype=0
    Living_Room_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.13:554/cam/realmonitor?channel=1&subtype=1

    # ── Dining Area ──
    Dining_Area:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.14:554/cam/realmonitor?channel=1&subtype=0
    Dining_Area_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.14:554/cam/realmonitor?channel=1&subtype=1

    # ── Kitchen Sink ──
    Kitchen_Sink:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.15:554/cam/realmonitor?channel=1&subtype=0
    Kitchen_Sink_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.15:554/cam/realmonitor?channel=1&subtype=1

    # ── Kitchen Dining ──
    Kitchen_Dining:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.16:554/cam/realmonitor?channel=1&subtype=0
    Kitchen_Dining_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.16:554/cam/realmonitor?channel=1&subtype=1

    # ── Gallery ──
    Gallery:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.17:554/cam/realmonitor?channel=1&subtype=0
    Gallery_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.17:554/cam/realmonitor?channel=1&subtype=1

    # ── Top Backside ──
    Top_Backside:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.18:554/cam/realmonitor?channel=1&subtype=0
    Top_Backside_Sub:
