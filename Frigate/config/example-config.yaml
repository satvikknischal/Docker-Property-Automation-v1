    Backside_Tanks_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.23:554/cam/realmonitor?channel=1&subtype=1

    # ── Study ──
    Study:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.24:554/cam/realmonitor?channel=1&subtype=0
    Study_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.24:554/cam/realmonitor?channel=1&subtype=1

    # ── Utility ──
    Utility:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.25:554/cam/realmonitor?channel=1&subtype=0
    Utility_Sub:
      - rtsp://{FRIGATE_RTSP_USER}:{FRIGATE_RTSP_PASSWORD}@10.100.40.25:554/cam/realmonitor?channel=1&subtype=1

  # WebRTC configuration for low-latency live view
  webrtc:
    candidates:
      - 10.100.10.23:8555    # UPDATE: Replace with your Frigate server IP
      - stun:8555

# ── Detector — OpenVINO (Intel GPU) ──────────────────────────────────────────
detectors:
  ov:
    type: openvino
    device: GPU

model:
  width: 300
  height: 300
  input_tensor: nhwc
  input_pixel_format: bgr
  path: /openvino-model/ssdlite_mobilenet_v2.xml
  labelmap_path: /openvino-model/coco_91cl_bkgr.txt

# ── Global detection defaults ────────────────────────────────────────────────
detect:
  enabled: true
  width: 704
  height: 576
  fps: 5

# ── Global object tracking ──────────────────────────────────────────────────
objects:
  track:
    - person
    - dog
    - cat
    - car
    - motorcycle
    - bicycle
  filters:
    person:
      min_area: 500
      threshold: 0.7
    car:
      min_area: 1000
      threshold: 0.7

# ── Recording DISABLED — Separate NVR handles continuous recording ───────────
record:
  enabled: false

# ── Snapshots — Alerts & events only, 4-day retention ───────────────────────
snapshots:
  enabled: true
  timestamp: true
  bounding_box: true
  crop: true                  # Crop snapshot to the detected object
  retain:
    default: 4                # Auto-delete after 4 days
    objects:
      person: 4
      car: 4
      dog: 4

# ── Review configuration ────────────────────────────────────────────────────
review:
  alerts:
    labels:
      - person
      - car
      - dog
    required_zones: []
  detections:
    labels:
      - person
      - car
      - motorcycle
      - dog
      - cat
    required_zones: []

# ── Semantic Search (NEW — requires Frigate 0.14+) ──────────────────────────
# Enables natural-language search across events, e.g. "person at the gate at night"
semantic_search:
  enabled: true

# ── Generative AI (NEW — requires Frigate 0.14+) ────────────────────────────
# Auto-generates text descriptions for every tracked event using an LLM.
# Uncomment and configure one of the providers below.

# Option A: Gemini (Google) — recommended, generous free tier
# genai:
#   enabled: true
#   provider: gemini
#   api_key: "{FRIGATE_GENAI_API_KEY}"
#   model: gemini-2.0-flash

# Option B: OpenAI
# genai:
#   enabled: true
#   provider: openai
#   api_key: "{FRIGATE_GENAI_API_KEY}"
#   model: gpt-4o-mini

# Option C: Ollama (fully local, no API key needed)
# genai:
#   enabled: true
#   provider: ollama
#   model: llava
#   api_key: ""

